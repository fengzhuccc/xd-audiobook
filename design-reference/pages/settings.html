<!DOCTYPE html>

<head>

    <style id="theme-vars">
/* ============================================
   Harmony Ebook Reader — Brand Design Tokens
   Style: Warm Bookish / 温暖书卷风
   ============================================ */

:root {
  /* ── Primary Palette — Warm Parchment ── */
  --color-primary: #8B6914;
  --color-primary-light: #C49A2A;
  --color-primary-lighter: #E8D5A3;
  --color-primary-lightest: #F5ECD7;
  --color-primary-dark: #6B4F0E;
  --color-primary-darker: #4A370A;

  /* ── Neutral Palette — Warm Grays ── */
  --color-neutral-50: #FDFBF7;
  --color-neutral-100: #F7F3EB;
  --color-neutral-200: #EDE6D8;
  --color-neutral-300: #DDD3BF;
  --color-neutral-400: #C4B69A;
  --color-neutral-500: #A89678;
  --color-neutral-600: #8A7A60;
  --color-neutral-700: #6E614C;
  --color-neutral-800: #554A3A;
  --color-neutral-900: #3D352A;

  /* ── Semantic Colors ── */
  --state-success: #5B8C3E;
  --state-warning: #D4920B;
  --state-error: #C44D3F;
  --state-info: #4A7B9D;

  /* ── Surface & Background ── */
  --surface-page: #FDFBF7;
  --surface-card: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-inset: #F7F3EB;
  --surface-reader: #FAF6EE;

  /* ── Text Colors ── */
  --text-primary: #3D352A;
  --text-secondary: #6E614C;
  --text-tertiary: #8A7A60;
  --text-inverse: #FDFBF7;
  --text-accent: #8B6914;
  --text-link: #6B4F0E;

  /* ── Border Colors ── */
  --border-default: #EDE6D8;
  --border-subtle: #F7F3EB;
  --border-strong: #C4B69A;

  /* ── Typography ── */
  --font-sans: "PingFang SC", "HarmonyOS Sans SC", "Noto Sans SC", system-ui, -apple-system, sans-serif;
  --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.0625rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  --leading-tight: 1.3;
  --leading-snug: 1.45;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;
  --leading-loose: 1.9;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.04em;

  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadow System ── */
  --shadow-sm: 0 1px 2px rgba(61, 53, 42, 0.04);
  --shadow-md: 0 2px 8px rgba(61, 53, 42, 0.05);
  --shadow-lg: 0 4px 16px rgba(61, 53, 42, 0.05);
  --shadow-xl: 0 8px 32px rgba(61, 53, 42, 0.05);

  /* ── Reader-specific Tokens ── */
  --reader-bg: #FAF6EE;
  --reader-text: #3D352A;
  --reader-line-height: 1.9;
  --reader-font-size: 1.0625rem;
  --reader-letter-spacing: 0.02em;
  --reader-paragraph-spacing: 1.2em;
  --reader-max-width: 42rem;

  /* ── Audio Player Tokens ── */
  --audio-progress-bg: #EDE6D8;
  --audio-progress-fill: #8B6914;
  --audio-control-bg: rgba(255, 255, 255, 0.95);
}

/* ── Dark Mode ── */
html.dark {
  --color-primary: #C49A2A;
  --color-primary-light: #D4AA3A;
  --color-primary-lighter: #8B6914;
  --color-primary-lightest: #6B4F0E;
  --color-primary-dark: #E8D5A3;
  --color-primary-darker: #F5ECD7;

  --color-neutral-50: #2A2520;
  --color-neutral-100: #332E27;
  --color-neutral-200: #3D352A;
  --color-neutral-300: #554A3A;
  --color-neutral-400: #6E614C;
  --color-neutral-500: #8A7A60;
  --color-neutral-600: #A89678;
  --color-neutral-700: #C4B69A;
  --color-neutral-800: #DDD3BF;
  --color-neutral-900: #EDE6D8;

  --surface-page: #1A1714;
  --surface-card: #2A2520;
  --surface-elevated: #332E27;
  --surface-inset: #222018;
  --surface-reader: #1E1B16;

  --text-primary: #EDE6D8;
  --text-secondary: #C4B69A;
  --text-tertiary: #A89678;
  --text-inverse: #3D352A;
  --text-accent: #C49A2A;
  --text-link: #D4AA3A;

  --border-default: #3D352A;
  --border-subtle: #2A2520;
  --border-strong: #554A3A;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.15);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.25);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.3);

  --reader-bg: #1E1B16;
  --reader-text: #DDD3BF;
  --audio-progress-bg: #3D352A;
  --audio-progress-fill: #C49A2A;
  --audio-control-bg: rgba(42, 37, 32, 0.95);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <div class="flex flex-col min-h-screen" style="background-color: var(--surface-page); font-family: var(--font-sans); color: var(--text-primary);">

        <!-- ========== Status Bar ========== -->

          <div class="flex items-center gap-1.5">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="9" width="3" height="3" rx="0.5" style="fill: var(--text-primary);"/><rect x="4.5" y="6" width="3" height="6" rx="0.5" style="fill: var(--text-primary);"/><rect x="9" y="3" width="3" height="9" rx="0.5" style="fill: var(--text-primary);"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" style="fill: var(--text-primary);"/></svg>
            <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="2" stroke="var(--text-primary)" stroke-width="1" fill="none"/><rect x="22" y="3.5" width="2" height="5" rx="1" style="fill: var(--text-primary);"/><rect x="2" y="2" width="16" height="8" rx="1" style="fill: var(--text-primary);"/></svg>
          </div>

        <div class="flex-1 overflow-y-auto px-4 pb-28" style="display: flex; flex-direction: column; gap: 12px;">

          <!-- ===== Reading Settings Card ===== -->
          <div style="background-color: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden;">

                <button class="flex-1 py-1.5 text-xs font-medium text-center" style="border-radius: var(--radius-sm); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-tertiary); cursor: pointer;">宽松</button>
              </div>
            </div>

            <!-- Page Turning -->
            <div class="px-4 py-3" style="border-bottom: 1px solid var(--border-subtle);">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm" style="color: var(--text-primary);">翻页方式</span>
              </div>
              <div class="flex gap-2">
                <button class="flex-1 py-1.5 text-xs font-medium text-center" style="border-radius: var(--radius-sm); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-tertiary); cursor: pointer;">点击翻页</button>
                <button class="flex-1 py-1.5 text-xs font-medium text-center" style="border-radius: var(--radius-sm); border: 1.5px solid var(--color-primary); background: var(--color-primary-lightest); color: var(--color-primary); cursor: pointer;">滑动翻页</button>
              </div>

            <!-- Theme Swatches -->

              <div class="flex items-center justify-between mb-2.5">
                <span class="text-sm" style="color: var(--text-primary);">阅读主题</span>
              </div>
              <div class="flex gap-3">
                <!-- Warm Cream (selected) -->
                <div class="flex-1 flex flex-col items-center gap-1.5 cursor-pointer">
                  <div class="relative" style="width: 100%; aspect-ratio: 3/4; border-radius: var(--radius-sm); background-color: #FAF6EE; border: 2px solid var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary-lighter); overflow: hidden;">
                    <!-- Mini preview text -->
                    <div class="px-1.5 pt-2 pb-1" style="font-size: 5px; line-height: 1.6; color: #3D352A; font-family: var(--font-serif);">
                      <div style="opacity: 0.9;">在人间</div>
                      <div style="opacity: 0.5; margin-top: 2px;">第一章&#x3000;童年</div>
                      <div style="opacity: 0.3; margin-top: 2px;">在一个幽暗的</div>
                    </div>
                    <!-- Checkmark -->
                    <div class="absolute" style="top: 3px; right: 3px; width: 14px; height: 14px; border-radius: 50%; background-color: var(--color-primary); display: flex; align-items: center; justify-content: center;">

                    <div class="px-1.5 pt-2 pb-1" style="font-size: 5px; line-height: 1.6; color: #1A1A1A; font-family: var(--font-serif);">
                      <div style="opacity: 0.9;">在人间</div>
                      <div style="opacity: 0.5; margin-top: 2px;">第一章&#x3000;童年</div>
                      <div style="opacity: 0.3; margin-top: 2px;">在一个幽暗的</div>
                    </div>
                  </div>
                  <span class="text-xs" style="color: var(--text-tertiary);">纯白</span>
                </div>

                <div class="flex-1 flex flex-col items-center gap-1.5 cursor-pointer">
                  <div class="relative" style="width: 100%; aspect-ratio: 3/4; border-radius: var(--radius-sm); background-color: #1E1B16; border: 1px solid var(--border-default); overflow: hidden;">
                    <div class="px-1.5 pt-2 pb-1" style="font-size: 5px; line-height: 1.6; color: #DDD3BF; font-family: var(--font-serif);">
                      <div style="opacity: 0.9;">在人间</div>
                      <div style="opacity: 0.5; margin-top: 2px;">第一章&#x3000;童年</div>
                      <div style="opacity: 0.3; margin-top: 2px;">在一个幽暗的</div>
                    </div>
                  </div>
                  <span class="text-xs" style="color: var(--text-tertiary);">夜间</span>
                </div>

            </div>

            <!-- Font Family -->

              </div>
              <div class="flex gap-2">

                <button class="flex-1 py-1.5 text-xs font-medium text-center" style="border-radius: var(--radius-sm); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-tertiary); cursor: pointer; font-family: 'PingFang SC', 'HarmonyOS Sans SC', sans-serif;">黑体</button>
