<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书库管理</title>
    <style id="theme-vars">
/* ============================================
   Harmony Ebook Reader — Brand Design Tokens
   Style: Warm Bookish / 温暖书卷风
   ============================================ */

:root {
  /* ── Primary Palette — Warm Parchment ── */
  --color-primary: #8B6914;
  --color-primary-light: #C49A2A;
  --color-primary-lighter: #E8D5A3;
  --color-primary-lightest: #F5ECD7;
  --color-primary-dark: #6B4F0E;
  --color-primary-darker: #4A370A;

  /* ── Neutral Palette — Warm Grays ── */
  --color-neutral-50: #FDFBF7;
  --color-neutral-100: #F7F3EB;
  --color-neutral-200: #EDE6D8;
  --color-neutral-300: #DDD3BF;
  --color-neutral-400: #C4B69A;
  --color-neutral-500: #A89678;
  --color-neutral-600: #8A7A60;
  --color-neutral-700: #6E614C;
  --color-neutral-800: #554A3A;
  --color-neutral-900: #3D352A;

  /* ── Semantic Colors ── */
  --state-success: #5B8C3E;
  --state-warning: #D4920B;
  --state-error: #C44D3F;
  --state-info: #4A7B9D;

  /* ── Surface & Background ── */
  --surface-page: #FDFBF7;
  --surface-card: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-inset: #F7F3EB;
  --surface-reader: #FAF6EE;

  /* ── Text Colors ── */
  --text-primary: #3D352A;
  --text-secondary: #6E614C;
  --text-tertiary: #8A7A60;
  --text-inverse: #FDFBF7;
  --text-accent: #8B6914;
  --text-link: #6B4F0E;

  /* ── Border Colors ── */
  --border-default: #EDE6D8;
  --border-subtle: #F7F3EB;
  --border-strong: #C4B69A;

  /* ── Typography ── */
  --font-sans: "PingFang SC", "HarmonyOS Sans SC", "Noto Sans SC", system-ui, -apple-system, sans-serif;
  --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.0625rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  --leading-tight: 1.3;
  --leading-snug: 1.45;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;
  --leading-loose: 1.9;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.04em;

  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadow System ── */
  --shadow-sm: 0 1px 2px rgba(61, 53, 42, 0.04);
  --shadow-md: 0 2px 8px rgba(61, 53, 42, 0.05);
  --shadow-lg: 0 4px 16px rgba(61, 53, 42, 0.05);
  --shadow-xl: 0 8px 32px rgba(61, 53, 42, 0.05);

  /* ── Reader-specific Tokens ── */
  --reader-bg: #FAF6EE;
  --reader-text: #3D352A;
  --reader-line-height: 1.9;
  --reader-font-size: 1.0625rem;
  --reader-letter-spacing: 0.02em;
  --reader-paragraph-spacing: 1.2em;
  --reader-max-width: 42rem;

  /* ── Audio Player Tokens ── */
  --audio-progress-bg: #EDE6D8;
  --audio-progress-fill: #8B6914;
  --audio-control-bg: rgba(255, 255, 255, 0.95);
}

/* ── Dark Mode ── */
html.dark {
  --color-primary: #C49A2A;
  --color-primary-light: #D4AA3A;
  --color-primary-lighter: #8B6914;
  --color-primary-lightest: #6B4F0E;
  --color-primary-dark: #E8D5A3;
  --color-primary-darker: #F5ECD7;

  --color-neutral-50: #2A2520;
  --color-neutral-100: #332E27;
  --color-neutral-200: #3D352A;
  --color-neutral-300: #554A3A;
  --color-neutral-400: #6E614C;
  --color-neutral-500: #8A7A60;
  --color-neutral-600: #A89678;
  --color-neutral-700: #C4B69A;
  --color-neutral-800: #DDD3BF;
  --color-neutral-900: #EDE6D8;

  --surface-page: #1A1714;
  --surface-card: #2A2520;
  --surface-elevated: #332E27;
  --surface-inset: #222018;
  --surface-reader: #1E1B16;

  --text-primary: #EDE6D8;
  --text-secondary: #C4B69A;
  --text-tertiary: #A89678;
  --text-inverse: #3D352A;
  --text-accent: #C49A2A;
  --text-link: #D4AA3A;

  --border-default: #3D352A;
  --border-subtle: #2A2520;
  --border-strong: #554A3A;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.15);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.25);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.3);

  --reader-bg: #1E1B16;
  --reader-text: #DDD3BF;
  --audio-progress-bg: #3D352A;
  --audio-progress-fill: #C49A2A;
  --audio-control-bg: rgba(42, 37, 32, 0.95);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20" style="background: var(--surface-page); font-family: var(--font-sans);">

      <!-- ====== Import Section (Hero) ====== -->
      <section class="mx-4 mt-4 rounded-xl overflow-hidden" style="background: linear-gradient(135deg, var(--color-primary-lightest) 0%, var(--surface-card) 50%, var(--color-primary-lightest) 100%); border: 2px dashed var(--color-primary-lighter);">
        <div class="flex flex-col items-center justify-center py-8 px-6 text-center">
          <!-- Upload icon circle -->
          <div class="flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: var(--color-primary); box-shadow: 0 4px 16px rgba(139, 105, 20, 0.25);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <button class="px-8 py-3 rounded-full text-base font-semibold tracking-wide text-white transition-all duration-200 hover:opacity-90 active:scale-95" style="background: var(--color-primary); box-shadow: 0 2px 12px rgba(139, 105, 20, 0.3);">
            导入书籍
          </button>
          <p class="mt-3 text-sm" style="color: var(--text-tertiary);">支持 EPUB、TXT、PDF、MOBI 格式</p>
        </div>
      </section>

      <!-- ====== Filter / Sort Chips ====== -->
      <section class="mt-5 px-4">
        <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
          <button class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors" style="background: var(--color-primary); color: white;">全部</button>
          <button class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors" style="background: var(--surface-inset); color: var(--text-secondary);">EPUB</button>
          <button class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors" style="background: var(--surface-inset); color: var(--text-secondary);">TXT</button>
          <button class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors" style="background: var(--surface-inset); color: var(--text-secondary);">PDF</button>
          <button class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors" style="background: var(--surface-inset); color: var(--text-secondary);">MOBI</button>
        </div>
      </section>

      <!-- ====== Stats Bar ====== -->
      <div class="px-4 mt-4">
        <p class="text-xs" style="color: var(--text-tertiary);">共 12 本 · 已读 5 本 · 未读 7 本</p>
      </div>

      <!-- ====== File List ====== -->
      <section class="mt-3 px-4 space-y-2">

        <!-- File 1: 山河入梦.epub -->
        <div class="flex items-center gap-3 p-3 rounded-lg" style="background: var(--surface-card); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
          <!-- Format badge -->
          <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold" style="background: rgba(91, 140, 62, 0.12); color: #5B8C3E;">EPUB</span>
          <!-- File info -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--text-primary);">山河入梦.epub</p>
            <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">2.4 MB · 2024-01-15</p>
          </div>
          <!-- Action button -->
          <button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors" style="color: var(--text-tertiary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </button>
        </div>

        <!-- File 2: 百年孤独.txt -->
        <div class="flex items-center gap-3 p-3 rounded-lg" style="background: var(--surface-card); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
          <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold" style="background: rgba(74, 123, 157, 0.12); color: #4A7B9D;">TXT</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--text-primary);">百年孤独.txt</p>
            <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">856 KB · 2024-01-12</p>
          </div>
          <button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors" style="color: var(--text-tertiary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </button>
        </div>

        <!-- File 3: 茶经.epub -->
        <div class="flex items-center gap-3 p-3 rounded-lg" style="background: var(--surface-card); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
          <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold" style="background: rgba(91, 140, 62, 0.12); color: #5B8C3E;">EPUB</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--text-primary);">茶经.epub</p>
            <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">1.8 MB · 2024-01-10</p>
          </div>
          <button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors" style="color: var(--text-tertiary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </button>
        </div>

        <!-- File 4: 人间词话.pdf -->
        <div class="flex items-center gap-3 p-3 rounded-lg" style="background: var(--surface-card); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
          <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold" style="background: rgba(196, 77, 63, 0.12); color: #C44D3F;">PDF</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--text-primary);">人间词话.pdf</p>
            <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">3.2 MB · 2024-01-08</p>
          </div>
          <button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors" style="color: var(--text-tertiary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </button>
        </div>

        <!-- File 5: 浮生六记.epub -->
        <div class="flex items-center gap-3 p-3 rounded-lg" style="background: var(--surface-card); border: 1px solid var(--border-default); box-shadow: var(--shadow-sm);">
          <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold" style="background: rgba(91, 140, 62, 0.12); color: #5B8C3E;">EPUB</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--text-primary);">浮生六记.epub</p>
            <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">1.1 MB · 2024-01-05</p>
          </div>
          <button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors" style="color: var(--text-tertiary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </button>
        </div>

      </section>

      <!-- ====== Bottom Tab Bar ====== -->
      <nav class="fixed bottom-0 left-0 right-0 z-50" style="background: var(--surface-card); border-top: 1px solid var(--border-default);">
        <div class="flex items-center justify-around py-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
          <!-- 书架 tab -->
          <a href="#" data-dom-id="tab-bookshelf" class="flex flex-col items-center gap-0.5 px-4 py-1 transition-colors" style="color: var(--text-tertiary);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
            <span class="text-xs">书架</span>
          </a>
          <!-- 书库 tab (active) -->
          <a href="#" data-dom-id="tab-library" class="flex flex-col items-center gap-0.5 px-4 py-1 transition-colors" style="color: var(--color-primary);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="text-xs font-medium">书库</span>
          </a>
          <!-- 设置 tab -->
          <a href="#" data-dom-id="tab-settings" class="flex flex-col items-center gap-0.5 px-4 py-1 transition-colors" style="color: var(--text-tertiary);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span class="text-xs">设置</span>
          </a>
        </div>
      </nav>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
